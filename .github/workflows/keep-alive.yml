name: Keep Render Alive

on:
  schedule:
    # Ping every 14 minutes to prevent Render free tier from sleeping
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping home-build dashboard
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://home-build-dashboard.onrender.com/api/budget/categories)
          echo "Response status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "Site is alive"
          else
            echo "Unexpected status: $STATUS"
            exit 1
          fi
