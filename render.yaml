services:
  - type: web
    name: home-build-dashboard
    runtime: node
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: home-build-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: home-build-db
    databaseName: homebuild
    user: homebuild
    plan: free
